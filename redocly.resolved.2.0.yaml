            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking.
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Retrieve Foreign Income Request
                description: Retrieve Foreign Income Request
                type: object
                properties:
                  submittedOn:
                    type: string
                    description: The date the foreign income was added. It must be provided in the format YYYY-MM-DDThh:mm:sssZ
                    example: 2021-04-06T09:37:797Z
                  foreignEarnings:
                    type: object
                    description: The container that holds the key value for foreign earnings
                    properties: *ref_7
                    required: *ref_8
                  unremittableForeignIncome:
                    type: array
                    items: *ref_9
                required:
                  - submittedOn
              examples:
                default:
                  description: Full Foreign Response
                  value:
                    submittedOn: '2021-04-06T09:37:79.000Z'
                    foreignEarnings:
                      customerReference: FOREIGNINCME123A
                      earningsNotTaxableUK: 1999.99
                    unremittableForeignIncome:
                      - countryCode: FRA
                        amountInForeignCurrency: 1999.99
                        amountTaxPaid: 1999.99
                      - countryCode: IND
                        amountInForeignCurrency: 2999.99
                        amountTaxPaid: 2999.99
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking.
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: *ref_10
                FORMAT_TAX_YEAR:
                  description: The format of the supplied tax year field is not valid.
                  value: *ref_11
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported.
                    Either the tax year specified is before the minimum tax year value, or it is after the maximum tax year value.
                  value: *ref_12
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: Tax year range invalid. A tax year range of one year is required.
                  value: *ref_13
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: *ref_14
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking.
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: *ref_15
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking.
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: The supplied income source could not be found.
                  value: &ref_19
                    code: MATCHING_RESOURCE_NOT_FOUND
                    message: Matching resource not found
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking.
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: Custom (will vary in production depending on the actual error)
                  value: *ref_16
    delete:
      summary: Delete Foreign Income
      security:
        - User-Restricted:
            - write:self-assessment
