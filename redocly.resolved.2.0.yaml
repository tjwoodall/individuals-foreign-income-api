          schema: *ref_6
          required: false
      responses:
        '204':
          description: No Content
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking.
                String, 36 characters.
              schema: *ref_0
              required: true
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking.
